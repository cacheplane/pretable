name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release — version PR or publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    env:
      NPM_CONFIG_PROVENANCE: true
      RELEASE_GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install npm 11.14.1 for trusted publishing OIDC
        run: |
          npm_config_prefix="$RUNNER_TEMP/npm" npm install --global npm@11.14.1
          echo "$RUNNER_TEMP/npm/bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/npm/bin/npm" --version

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
      - run: pnpm -r --filter '@pretable/core' --filter '@pretable/react' --filter '@cacheplane/json-stream' lint:packaging

      - name: Version PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm exec changeset version
          publish: node ./scripts/publish-configured-packages.mjs
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ env.RELEASE_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge on Version PR
        if: steps.changesets.outputs.pullRequestNumber != '' && env.RELEASE_GITHUB_TOKEN != ''
        env:
          GH_TOKEN: ${{ env.RELEASE_GITHUB_TOKEN }}
        run: |
          gh pr merge \
            --auto \
            --squash \
            --repo ${{ github.repository }} \
            ${{ steps.changesets.outputs.pullRequestNumber }}
